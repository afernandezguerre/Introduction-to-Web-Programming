<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deportes - Posts</title>
    <link rel="stylesheet" href="sports.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <a href="../index.html" class="boton-volver" title="Volver al inicio">
        <i class="fas fa-arrow-left"></i>
    </a>

    <section class="contenedor-busqueda-completa">
        <div class="barra-busqueda-deportes">
            <i class="fas fa-search icono-buscar"></i>
            <input type="text" id="buscadorDeportes" placeholder="Buscar posts de deportes...">
        </div>
    </section>

    <main class="feed-deportes">

        <article class="tarjeta-post" data-titulo="Crónica Maratón Popular">
            <h2 class="titulo-post">Rayo Vallecano: Lunes de fútbol y la protesta de un barrio</h2>
            
            <div class="carrusel-instagram">
                <div class="pantalla-post">
                    <div class="carrete-post">
                        <img src="Articles/Article_1/S1.png" alt="Diapositiva 1">
                        <img src="Articles/Article_1/S2.png" alt="Diapositiva 2">
                        <img src="Articles/Article_1/S3.png" alt="Diapositiva 3">
                        <img src="Articles/Article_1/S4.png" alt="Diapositiva 4">
                        <img src="Articles/Article_1/S5.png" alt="Diapositiva 5">
                        <img src="Articles/Article_1/S6.png" alt="Diapositiva 6">
                        <img src="Articles/Article_1/S7.png" alt="Diapositiva 7">
                        <img src="Articles/Article_1/S8.png" alt="Diapositiva 8">
                        <img src="Articles/Article_1/S9.png" alt="Diapositiva 9">
                        <img src="Articles/Article_1/S10.png" alt="Diapositiva 10">
                        <img src="Articles/Article_1/S11.png" alt="Diapositiva 11">
                        <img src="Articles/Article_1/S12.png" alt="Diapositiva 12">
                        <img src="Articles/Article_1/S13.png" alt="Diapositiva 13">
                    </div>
                </div>
                <button class="btn-post-siguiente" title="Siguiente diapositiva">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            
            <div class="linea-separadora-deportes"></div>
        </article>

        <article class="tarjeta-post" data-titulo="Análisis Torneo de Fútbol">
            <h2 class="titulo-post">Borrador</h2>
            
            <div class="carrusel-instagram">
                <div class="pantalla-post">
                    <div class="carrete-post">
                        <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=800" alt="Diapositiva 1 - Fútbol">
                        <img src="https://images.unsplash.com/photo-1517466787929-bc90951d0974?w=800" alt="Diapositiva 2 - Fútbol">
                    </div>
                </div>
                <button class="btn-post-siguiente" title="Siguiente diapositiva">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            
            <div class="linea-separadora-deportes"></div>
        </article>

    </main>

    <script src="sports.js"></script>
</body>
</html>
