<!DOCTYPE html>
<html lang="es">
<head>

    <title>Cultura - Léxico Autóctono</title>

<body>

    <!-- Botón Volver Atrás obligatorio -->
    <a href="../index.html" class="boton-volver" title="Volver al inicio">
        <i class="fas fa-arrow-left"></i>
    </a>

    <!-- Barra de búsqueda completa -->
    <section class="contenedor-busqueda-completa">

        <button id="btnColeccionSig" class="flecha-coleccion flecha-der" title="Siguiente tarjeta"><i class="fas fa-chevron-right"></i></button>

        <!-- Ventana de visualización -->
        <div class="pantalla-slider-global">
            <div class="carrete-slider-global" id="carreteGlobal">

                <!-- TARJETA VERTICAL 1 -->
                <article class="tarjeta-vertical" data-titulo="Serendipia">

                                </div>

                            </div>
                        </div>

                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </article>

                <!-- TARJETA VERTICAL 2 -->

                    <div class="carrusel-instagram">
