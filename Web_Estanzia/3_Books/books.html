<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Críticas Literarias - Libros</title>
    <link rel="stylesheet" href="books.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <a href="../index.html" class="boton-volver" title="Volver al inicio">
        <i class="fas fa-arrow-left"></i>
    </a>

    <main class="contenedor-books">
        
        <section class="seccion-busqueda">
            <div class="barra-busqueda">
                <i class="fas fa-search icono-buscar"></i>
                <input type="text" id="inputBuscador" placeholder="Buscar libro, crítica o artículo...">
            </div>
        </section>

        <section class="estanteria-libros">
            
            <div class="bloque-genero" data-genero="Novela Contemporánea">
                <h2 class="nombre-genero">Novela Contemporánea</h2>
                <div class="linea-separadora"></div>
                <div class="cuadricula-libros">

                    <div class="tarjeta-libro" data-titulo="La playa" data-autor="Cesare Pavese" data-articulo="Articles/critica_la_playa.html">
                        <div class="portada">
                            <img src="https://assets.lectulandia.co/b/ab/Cesare%20Pavese/La%20playa%20(1)/big.jpg" alt="La playa">
                        </div>
                        <h3>La playa</h3>
                        <p>Cesare Pavese</p>
                    </div>
                    
                    <div class="tarjeta-libro" data-titulo="Las Maravillas" data-autor="Elena Medel" data-articulo="Articles/critica_las_maravillas.html">
                        <div class="portada">
                            <img src="https://cms.anagrama-ed.es/uploads/media/portadas/0001/24/eea5ffc3408bfb61de827fb1b1a7ed592f9e002c.jpeg" alt="Las Maravillas">
                        </div>
                        <h3>Las Maravillas</h3>
                        <p>Elena Medel</p>
                    </div>
                </div>
            </div>

            <div class="bloque-genero" data-genero="Policíaca Experimental">
                <h2 class="nombre-genero">Novela Policíaca</h2>
                <div class="linea-separadora"></div>
                <div class="cuadricula-libros">
                    <div class="tarjeta-libro" data-titulo="La Trilogia de Nueva York" data-autor="Paul Auster" data-articulo="Articles/critica_la_trilogia_nueva_york.html">
                        <div class="portada">
                            <img src="https://www.planetadelibros.com/usuaris/libros/fotos/301/original/portada_la-trilogia-de-nueva-york_paul-auster_201907181317.jpg" alt="La Trilogía de Nueva York">
                        </div>
                        <h3>La Trilogia de Nueva York</h3>
                        <p>Paul Auster</p>
                    </div>
                </div>

                
            </div>

            <div class="bloque-genero" data-genero="Novela Histórica">
                <h2 class="nombre-genero">Novela Histórica</h2>
                <div class="linea-separadora"></div>
                <div class="cuadricula-libros">
                    <div class="tarjeta-libro" data-titulo="El ferrocarril subterráneo" data-autor="Colson Whitehead" data-articulo="Articles/critica_el_ferrocarril_subterraneo.html">
                        <div class="portada">
                            <img src="https://m.media-amazon.com/images/I/A1ob7zgryUL.jpg" alt="El ferrocarril subterráneo">
                        </div>
                        <h3>El ferrocarril subterráneo</h3>
                        <p>Colson Whitehead</p>
                    </div>

                
                </div>

                
            </div>

            <div class="bloque-genero" data-genero="No Ficción / Crónica Periodística">
                <h2 class="nombre-genero">No Ficción / Crónica Periodística</h2>
                <div class="linea-separadora"></div>
                <div class="cuadricula-libros">
                    <div class="tarjeta-libro" data-titulo="La desaparición del futbolista militante" data-autor="Guy Chiappaventi" data-articulo="Articles/critica_la_desaparicion_del_futbolista_militante.html">
                        <div class="portada">
                            <img src="https://altamarea.es/wp-content/uploads/2025/05/9788410435124-768x1150.jpg" alt="La desaparición del futbolista militante">
                        </div>
                        <h3>La desaparición del futbolista militante</h3>
                        <p>Guy Chiappaventi</p>
                    </div>

                
                </div>

                
            </div>

        </section>
    </main>

    <div id="modalArticulo" class="modal-fondo">
        <div class="modal-contenido">
            <button id="cerrarModal" class="boton-cerrar-modal"></button>
            
            <article id="cuerpoArticulo" class="estilos-word-html">
                </article>
        </div>
    </div>

    <script src="books.js"></script>
</body>
</html>
