<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportajes - Un idéntico sentir</title>
    <link rel="stylesheet" href="report.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <a href="../index.html" class="boton-volver" title="Volver al inicio">
        <i class="fas fa-arrow-left"></i>
    </a>

    <main class="contenedor-reportajes">
        <h1 class="titulo-principal">Último reportaje</h1>

        <div class="zona-reproductor">
            <div class="carrete lateral-izquierdo">
                <div class="perforacion"></div>
                <div class="perforacion"></div>
                <div class="perforacion"></div>
                <div class="perforacion"></div>
            </div>

            <div class="contenedor-video">
                <iframe width="560" height="315" src="https://www.youtube.com/embed/1znIavh89W4?si=qUfD0lgxQ47Kz0S2" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>

            <div class="carrete lateral-derecho">
                <div class="perforacion"></div>
                <div class="perforacion"></div>
                <div class="perforacion"></div>
                <div class="perforacion"></div>
            </div>
        </div>

        <footer class="pie-reportajes">
            <a href="https://www.youtube.com/@carlos.vallejo" target="_blank" class="enlace-canal">
                <i class="fab fa-youtube"></i> Visitar Canal de YouTube
            </a>
            <p class="texto-secundario">¡Para ver más vídeos, métete a nuestro canal de YouTube!</p>
        </footer>
    </main>

    <script src="report.js"></script>
</body>
</html>
