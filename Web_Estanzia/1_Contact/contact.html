<!DOCTYPE html>
<html lang="es">
<head>

    <a href="../index.html" class="boton-volver" title="Volver al inicio">

                </a>

            <div class="columna-centro">
                <h2>Carlos</h2>
                <p>Periodista y apasionado de la comunicación. Aquí puedes escribir tu biografía, quién eres o una frase sobre periodismo que te represente y defina tu trabajo.</p>
            </div>

            <div class="columna-derecha">
                <div class="foto-perfil">
                    <img src="AQUÍ_VA_EL_RUTA_DE_TU_FOTO.jpg" alt="Foto de perfil de Carlos">

            </div>

        </div>
